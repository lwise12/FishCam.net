<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FishCam.net</title>

<style>

body{
    margin:0;
    font-family:Verdana, Arial, sans-serif;
    background-image:url("underwater-tile.jpg");
    background-repeat:repeat;
    color:#2f2b1f;
}

#container{
    width:90%;
    max-width:1500px;
    margin:auto;
    padding:20px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    margin:0;
    font-size:72px;
    color:#f2f0dd;

    text-shadow:
        2px 2px #374028,
        4px 4px #222;
}

.header p{
    margin:5px;
    color:#f2f0dd;
    font-size:22px;
}

.visitor-counter{
    display:inline-block;
    margin-top:15px;
    background:#d7d1b3;
    border:3px outset #c9c19d;
    padding:10px 20px;
}

.visitor-title{
    font-weight:bold;
    margin-bottom:5px;
}

.counter{
    background:black;
    color:#00ff00;
    font-family:"Courier New", monospace;
    font-size:26px;
    padding:6px 20px;
}

/* STREAM */

.stream-box{
    background:#d7d1b3;
    border:3px outset #c9c19d;
    padding:15px;
}

.stream-title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.stream-wrapper{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
}

.stream-wrapper iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

/* RESIDENTS */

.residents-box{
    margin-top:40px;
    background:#d7d1b3;
    border:3px outset #c9c19d;
    padding:20px;
}

.residents-box h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
}

.resident-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.resident{
    background:#e8e2c9;
    border:2px solid #7d7658;
    text-align:center;
    padding:10px;
}

.resident img{
    width:100%;
    height:180px;
    object-fit:cover;
    border:1px solid #999;
    background:#ddd;
}

.resident-name{
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:20px;
    color:#f2f0dd;
    font-size:14px;
}

/* MOBILE */

@media(max-width:700px){

.header h1{
    font-size:48px;
}

.header p{
    font-size:18px;
}

}

</style>
</head>

<body>

<div id="container">

<div class="header">

<h1>FishCam.net</h1>

<p>~ Live Freshwater Aquarium ~</p>

<div class="visitor-counter">

<div class="visitor-title">
Visitors Since Launch
</div>

<div class="counter" id="counter">
Loading...
</div>

<script>
let count = localStorage.getItem("fishcam-counter");

if(count === null){
    count = 11;
}else{
    count = parseInt(count) + 1;
}

localStorage.setItem("fishcam-counter", count);

document.getElementById("counter").textContent =
String(count).padStart(6,"0");
</script>

</div>

</div>

<div class="stream-box">

<div class="stream-title">
Aquarium Feed
</div>

<div class="stream-wrapper">

<iframe
src="https://www.youtube.com/embed/27CIU5-ZdXQ?autoplay=1"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

</div>

<div class="residents-box">

<h2>Meet the Residents</h2>

<div class="resident-grid">

<div class="resident">
<img src="Danio.jpg" alt="Giant Danio">
<div class="resident-name">Giant Danio</div>
</div>

<div class="resident">
<img src="Lampeye.jpg" alt="Lamp-eye Tetra">
<div class="resident-name">Lamp-eye Tetra</div>
</div>

<div class="resident">
<img src="Ember.jpg" alt="Ember Tetra">
<div class="resident-name">Ember Tetra</div>
</div>

<div class="resident">
<img src="Platy.jpg" alt="Platy">
<div class="resident-name">Platy</div>
</div>

<div class="resident">
<img src="Snail.png" alt="Golden Mystery Snail">
<div class="resident-name">Golden Mystery Snail</div>
</div>

</div>

</div>

<div class="footer">
FishCam.net © 2026
</div>

</div>

</body>
</html>
```
