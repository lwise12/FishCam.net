<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FishCam.net</title>

<style>

body{
    margin:0;

    background-image:url("underwater-tile.jpg");
    background-repeat:repeat;

    color:#000;
}

/* MAIN PAGE */

#container{
    width:95%;
    max-width:1600px;
    margin:auto;
    padding:20px;
}

/* HEADER */

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    margin:0;
    font-size:72px;
    color:#d9ecff;
    text-shadow:2px 2px #23465a;
}

.header p{
    margin:5px;
    color:white;
    font-size:22px;
}

/* STREAM */

.stream-box{
    background:#d7e7f2;
    border:3px outset white;
    padding:15px;
    margin-bottom:20px;
}

.stream-title{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:15px;
}

.stream-wrapper{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
}

.stream-wrapper iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

/* COUNTER */

.counter-box{
    width:250px;
    margin:0 auto 30px auto;
    background:#d7e7f2;
    border:3px outset white;
    text-align:center;
    padding:10px;
}

.counter-title{
    font-weight:bold;
    margin-bottom:10px;
}

.counter{
    background:black;
    color:#00ff00;
    padding:10px;
    font-family:"Courier New", monospace;
    font-size:26px;
}

/* RESIDENTS */

.residents-box{
    background:#d7e7f2;
    border:3px outset white;
    padding:20px;
}

.residents-box h2{
    text-align:center;
    margin-top:0;
}

.resident-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.resident{
    background:white;
    border:2px solid #999;
    text-align:center;
    padding:10px;
}

.resident img{
    width:100%;
    height:180px;
    object-fit:cover;
    background:#ddd;
}

.resident-name{
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:20px;
    color:white;
    font-size:14px;
}

</style>
</head>

<body>

<div id="container">

<div class="header">

<h1>FishCam.net</h1>

<p>~ Live Freshwater Aquarium ~</p>

</div>

<div class="stream-box">

<div class="stream-title">
LIVE AQUARIUM CAMERA
</div>

<div class="stream-wrapper">

<iframe
src="https://www.youtube.com/embed/tEPmFeUhGRI?autoplay=1&mute=1"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

</div>

<div class="counter-box">

<div class="counter-title">
Visitors Since Launch
</div>

<div class="counter">
000042
</div>

</div>

<div class="residents-box">

<h2>Meet the Residents</h2>

<div class="resident-grid">

<div class="resident">
<img src="giant-danio.jpg" alt="Giant Danio">
<div class="resident-name">Giant Danio</div>
</div>

<div class="resident">
<img src="lamp-eye-tetra.jpg" alt="Lamp-eye Tetra">
<div class="resident-name">Lamp-eye Tetra</div>
</div>

<div class="resident">
<img src="ember-tetra.jpg" alt="Ember Tetra">
<div class="resident-name">Ember Tetra</div>
</div>

<div class="resident">
<img src="platy.jpg" alt="Platy">
<div class="resident-name">Platy</div>
</div>

<div class="resident">
<img src="golden-mystery-snail.jpg" alt="Golden Mystery Snail">
<div class="resident-name">Golden Mystery Snail</div>
</div>

</div>

</div>

<div class="footer">

FishCam.net © 2026

</div>

</div>

</body>
</html>
```
