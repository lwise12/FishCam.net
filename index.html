<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FishCam.net</title>

<style>

body{
    margin:0;
    font-family:Verdana, Arial, sans-serif;

    background-image:url("underwater-tile.jpg");
    background-repeat:repeat;

    color:#2f2b1f;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    margin:0;
    font-size:72px;

    color:#f2f0dd;

    text-shadow:
        2px 2px #374028,
        4px 4px #222;
}

.header p{
    margin:5px;
    color:#f2f0dd;
    font-size:22px;
}

.stream-box{
    background:#d7d1b3;
    border:3px outset #c9c19d;
    padding:15px;
    margin-bottom:20px;
}

.counter-box{
    width:250px;
    margin:0 auto 30px auto;

    background:#d7d1b3;
    border:3px outset #c9c19d;

    text-align:center;
    padding:10px;
}

.residents-box{
    background:#d7d1b3;
    border:3px outset #c9c19d;
    padding:20px;
}

.residents-box h2{
    text-align:center;
    margin-top:0;
    color:#2f2b1f;
}

.resident{
    background:#e8e2c9;
    border:2px solid #7d7658;
    text-align:center;
    padding:10px;
}

.resident-name{
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
    color:#2f2b1f;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#f2f0dd;
    font-size:14px;
}
</style>
</head>

<body>

<div id="container">

<div class="header">

<h1>FishCam.net</h1>

<p>~ Live Freshwater Aquarium ~</p>

</div>

<div class="stream-box">

<div class="stream-title">
LIVE AQUARIUM CAMERA
</div>

<div class="stream-wrapper">

<iframe
src="https://www.youtube.com/embed/tEPmFeUhGRI?autoplay=1&mute=1"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

</div>

<div class="counter-box">

<div class="counter-title">
Visitors Since Launch
</div>

<div class="counter">
000042
</div>

</div>

<div class="residents-box">

<h2>Meet the Residents</h2>

<div class="resident-grid">

<div class="resident">
<img src="giant-danio.jpg" alt="Giant Danio">
<div class="resident-name">Giant Danio</div>
</div>

<div class="resident">
<img src="lamp-eye-tetra.jpg" alt="Lamp-eye Tetra">
<div class="resident-name">Lamp-eye Tetra</div>
</div>

<div class="resident">
<img src="ember-tetra.jpg" alt="Ember Tetra">
<div class="resident-name">Ember Tetra</div>
</div>

<div class="resident">
<img src="platy.jpg" alt="Platy">
<div class="resident-name">Platy</div>
</div>

<div class="resident">
<img src="golden-mystery-snail.jpg" alt="Golden Mystery Snail">
<div class="resident-name">Golden Mystery Snail</div>
</div>

</div>

</div>

<div class="footer">

FishCam.net © 2026

</div>

</div>

</body>
</html>
